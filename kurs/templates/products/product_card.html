<div class="col">
  <div class="card h-100 product-card">
    <img src="{{ product.image.url|default:'https://via.placeholder.com/300x180?text=No+Image' }}" class="card-img-top" alt="{{ product.title }}">
    <div class="card-body d-flex flex-column">
      <h5 class="card-title">{{ product.title }}</h5>
      <p class="card-text text-muted small">{{ product.category.name|default:'' }}</p>
      <p class="card-text mb-4">{{ product.description|truncatechars:100 }}</p>
      <div class="mt-auto d-flex justify-content-between align-items-center">
        <strong class="fs-5">{{ product.price }} ₽</strong>
        <a href="{% url 'product-detail' product.slug %}" class="btn btn-sm btn-primary">Купить</a>
      </div>
    </div>
  </div>
</div>
